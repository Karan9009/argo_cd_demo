apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-shop-blue
  namespace: blue-green-ns
  labels: 
    app: online-shop-blue
spec:
  replicas: 4   # 👈 Correct spelling (was "replica")
  selector:
    matchLabels:
      app: online-shop-blue
  template:
    metadata:
      labels:
        app: online-shop-blue
    spec:
      containers:
      - name: online-shop-blue
        image: amitabhdevops/online_shop_without_footer
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"   # 👈 Changed from Gi to Mi
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: online-shop-blue-deployment-service
  namespace: blue-green-ns
spec:
  selector:
    app: online-shop-green
  type: NodePort
  ports:
    - protocol: TCP        # 👈 Correct spelling (was "protocal")
      port: 3001           # 👈 Service port
      targetPort: 3000     # 👈 Container port
      nodePort: 30001      # 👈 Must be in 30000–32767 range
