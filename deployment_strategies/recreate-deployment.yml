apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-shop
  namespace: recreate-ns
  labels:
    app: online-shop
spec:
  replicas: 4
  strategy:
    type: Recreate   # 👈 Correct spelling
  selector:
    matchLabels:
      app: online-shop
  template:          # 👈 Correct spelling (was "templete")
    metadata:
      labels:
        app: online-shop
    spec:
      containers:
      - name: online-shop
        image: amitabhdevops/online_shop:latest
        resources:    # 👈 Correct key (was "resource")
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
