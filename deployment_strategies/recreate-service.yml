apiVersion: v1
kind: Service
metadata:
  name: recreate-svc
  namespace: recreate-ns
spec:
  selector:
    app: online-shop
  type: NodePort   # 👈 Correct capitalization
  ports:
    - protocol: TCP   # 👈 Correct spelling (was "protocal")
      port: 3000      # 👈 Lowercase "port"
      targetPort: 3000
      nodePort: 30000 # 👈 Must be in 30000–32767 range
