apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-shop
  namespace: rolling-update-ns
  labels:
    app: online-shop
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: online-shop

  template:
    metadata:
      labels:
        app: online-shop

    spec:
      containers:
      - name: online-shop
        image: amitabhdevops/online_shop_without_footer
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
